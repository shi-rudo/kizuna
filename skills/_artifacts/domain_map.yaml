tensions:
  - name: 'Parameter naming convention vs class naming convention'
    skills: ['kizuna']
    description: >
      Strict parameter validation wants dependency keys to match constructor
      parameter names (e.g., 'db'). But conventional naming wants keys to match
      class names (e.g., 'DatabaseConnection'). Both are valid; mixing them
      produces inconsistent registries.
    implication: >
      An agent defaults to class-name-based keys, hits validation warnings,
      then either disables strict validation (losing safety) or starts renaming
      everything (creating inconsistency). The correct move is to pick one
      convention upfront and stick with it.

  - name: 'Getting-started simplicity vs production safety'
    skills: ['kizuna']
    description: >
      build() works without calling validate(). This makes the getting-started
      experience frictionless but means production containers can have undetected
      missing dependencies, circular deps, and parameter mismatches.
    implication: >
      An agent generating a quickstart example correctly skips validate() for
      simplicity. An agent generating production code that also skips validate()
      creates a time bomb. The agent must judge context (prototype vs production)
      to decide whether to include validation.

  - name: 'Type safety ergonomics vs API surface size'
    skills: ['kizuna']
    description: >
      Full type safety across 3 patterns x 3 lifecycles produces 9 registration
      methods plus 3 Interface variants = 12 methods. This gives perfect type
      inference but makes the API surface large and the "right method" non-obvious.
    implication: >
      An agent facing a registration decision may pick a method based on name
      similarity (registerSingletonInterface because the class implements an
      interface) rather than understanding that the choice is purely about the
      resolved type generic. The Interface variants are the most common trap.

  - name: 'Factory flexibility vs hidden dependency graph'
    skills: ['kizuna']
    description: >
      Factory registration gives maximum flexibility (conditional logic, async init)
      but hides dependencies from validate(). Constructor registration declares
      dependencies explicitly but cannot handle complex initialization.
    implication: >
      An agent that defaults to factories (because they look general-purpose)
      silently breaks the validation safety net. Dependencies resolved inside
      factories are invisible to validate() — missing deps only surface at runtime.

