    reference_candidates:
      - topic: 'registration patterns'
        reason: '15 registration methods across 4 patterns x 3 lifecycles, each with distinct type signatures and use cases'
      - topic: 'lifecycle decision guide'
        reason: '3 lifecycles with distinct caching, disposal, and scoping semantics plus captive dependency interactions'
      - topic: 'validation errors'
        reason: 'Multiple error types (missing deps, circular deps, param mismatch) with distinct debugging approaches'
      - topic: 'middleware scoping patterns'
        reason: 'Express/Hono/Fastify each have slightly different middleware APIs for scope creation and disposal'
      - topic: 'framework integration (Next.js)'
        reason: 'No middleware chain; scope lifecycle unclear in server components, route handlers, and server actions'
      - topic: 'framework integration (TanStack Start)'
        reason: 'Loaders run in parallel; different scoping needs than middleware-based frameworks'
      - topic: 'testing patterns'
        reason: 'Multiple approaches: full test container, factory-based mocking, scope isolation'
      - topic: 'migration guide'
        reason: 'Mapping from decorator-based DI (tokens, @Injectable) to name-based wiring requires systematic translation'
    failure_modes:
      - mistake: 'Omitting mandatory string key in registration'
        mechanism: >
          Every registration method requires a string key as the first argument.
          Agents trained on tsyringe, inversify, or NestJS write
          .registerSingleton(UserService) which has no matching overload and fails
          to compile.
        wrong_pattern: |
          const container = new ContainerBuilder()
            .registerSingleton(UserService)
            .build();
        correct_pattern: |
          const container = new ContainerBuilder()
            .registerSingleton('UserService', UserService)
            .build();
        source: 'maintainer interview; container-builder.ts method signatures'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions — Kizuna has always required string keys'

      - mistake: 'Assuming build() validates the container'
        mechanism: >
          build() does NOT call validate(). It creates a ServiceProvider without
          checking for missing dependencies, circular dependencies, or parameter
          mismatches. Errors surface at resolution time, not build time. The
          validate() method exists but must be called explicitly.
        wrong_pattern: |
          const container = new ContainerBuilder()
            .registerSingleton('UserService', UserService, 'Database')
            // 'Database' never registered — no error here
            .build();
          // Explodes at runtime when container.get('UserService') is called
        correct_pattern: |
          const builder = new ContainerBuilder()
            .registerSingleton('UserService', UserService, 'Database');
          const issues = builder.validate();
          if (issues.length > 0) {
            throw new Error(`Container validation failed:\n${issues.join('\n')}`);
          }
          const container = builder.build();
        source: 'maintainer interview; container-builder.ts:273-283'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions'

      - mistake: 'Captive dependency — singleton captures scoped service'
        mechanism: >
          validate() does not check for lifecycle mismatches. A singleton that
          depends on a scoped service captures the first scope instance and holds
          it forever. Subsequent requests see stale state from the first request.
          This passes validation with zero warnings.
        wrong_pattern: |
          new ContainerBuilder()
            .registerScoped('requestContext', RequestContext)
            .registerSingleton('userService', UserService, 'requestContext')
            .build();
          // userService holds the FIRST request's context forever
        correct_pattern: |
          new ContainerBuilder()
            .registerScoped('requestContext', RequestContext)
            .registerScoped('userService', UserService, 'requestContext')
            .build();
          // Both are scoped — each request gets fresh instances
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
        version_context: 'All versions — validation does not check lifecycle mismatches'

      - mistake: 'Using factory registration when constructor registration suffices'
        mechanism: >
          Agents default to factories because they look like the safe general-purpose
          pattern. The factory manually resolves dependencies via provider.get(),
          duplicating what Kizuna does automatically with constructor registration.
          The result is verbose code that hides the dependency graph from validation.
        wrong_pattern: |
          .registerSingletonFactory('UserService', (provider) => {
            const db = provider.get('Database');
            const logger = provider.get('Logger');
            return new UserService(db, logger);
          })
        correct_pattern: |
          .registerSingleton('UserService', UserService, 'Database', 'Logger')
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'

      - mistake: 'Using registerSingletonInterface when registerSingleton works'
        mechanism: >
          The word "Interface" in the method name attracts agents. But
          registerSingletonInterface only differs at the type level — it sets the
          resolved type to the generic parameter instead of the concrete class.
          At runtime, both methods do exactly the same thing. Agents sprinkle
          Interface variants everywhere "just to be safe."
        wrong_pattern: |
          // Unnecessary — Logger IS the resolved type you want
          .registerSingletonInterface<Logger>('Logger', ConsoleLogger)
        correct_pattern: |
          // Use Interface variant ONLY when you want the resolved type to be
          // an abstraction (interface) different from the concrete class
          .registerSingleton('Logger', ConsoleLogger)
          // OR if you explicitly want ILogger as the resolved type:
          .registerSingletonInterface<ILogger>('Logger', ConsoleLogger)
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions'

      - mistake: 'Adding decorators that do not exist'
        mechanism: >
          Agents trained on NestJS, tsyringe, or inversify add @Injectable(),
          @Inject(), or @Service() decorators to service classes. Kizuna does not
          use decorators — services are plain classes with no library-specific code.
          The decorator imports fail to resolve.
        wrong_pattern: |
          import { Injectable, Inject } from '@shirudo/kizuna';

          @Injectable()
          class UserService {
            constructor(@Inject('Database') private db: Database) {}
          }
        correct_pattern: |
          // No decorators needed — services are plain classes
          class UserService {
            constructor(private db: Database) {}
          }

          new ContainerBuilder()
            .registerSingleton('UserService', UserService, 'Database')
            .build();
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions — Kizuna has never used decorators'

      - mistake: 'Parameter name vs registration name mismatch'
        mechanism: >
          Strict parameter validation (enabled by default) checks that dependency
          string keys match constructor parameter names positionally. If a class has
          constructor(private db: DatabaseConnection) and you register the dependency
          as 'DatabaseConnection', validation warns because the param name is 'db'
          not 'DatabaseConnection'. This creates a tension between naming conventions.
        wrong_pattern: |
          class UserService {
            constructor(private db: DatabaseConnection) {}
          }
          // Validation warns: param 0 is 'db' but 'DatabaseConnection' is provided
          .registerSingleton('DatabaseConnection', DatabaseConnection)
          .registerSingleton('UserService', UserService, 'DatabaseConnection')
        correct_pattern: |
          // Option A: Name registrations to match param names
          .registerSingleton('db', DatabaseConnection)
          .registerSingleton('UserService', UserService, 'db')

          // Option B: Use consistent naming from the start
          // Register as 'database' and name the constructor param 'database'
          class UserService {
            constructor(private database: DatabaseConnection) {}
          }
          .registerSingleton('database', DatabaseConnection)
          .registerSingleton('UserService', UserService, 'database')
        source: 'maintainer interview; base-container-builder.ts:171-193'
        priority: 'HIGH'
        status: 'active'
        version_context: 'All versions — strict parameter validation enabled by default'

      - mistake: 'Believing null factory return breaks caching (outdated myth)'
        mechanism: >
          Both SingletonLifecycle and ScopedLifecycle use a boolean _initialized
          flag to track whether an instance has been created. Any return value is
          cached correctly — including null, undefined, 0, and false. Older docs
          and AI training data may claim that returning null breaks caching because
          of an if (this._instance === null) check, but this check does not exist
          in the current code. Agents trained on outdated information may add
          unnecessary null-avoidance patterns in factories.
        wrong_pattern: |
          // Unnecessary workaround — null is cached just fine
          .registerSingletonFactory('optionalConfig', () => {
            return process.env.CONFIG_PATH ? loadConfig() : undefined;
          })
        correct_pattern: |
          // Both null and undefined work correctly
          .registerSingletonFactory('optionalConfig', () => {
            return process.env.CONFIG_PATH ? loadConfig() : null;
          })
        source: 'singleton.ts:54,132 (_initialized flag); scoped.ts:68,150 (_initialized flag)'
        priority: 'MEDIUM'
        status: 'resolved'
        version_context: 'Never was a bug — code always used _initialized flag'

      - mistake: 'Using non-existent APIs from examples and docs'
        mechanism: >
          The example file unified-container-example.ts uses registerInterface()
          (line 109) and registerFactory() (line 113) — neither exists.
          concurrency-patterns.md references registerInstance() (line 229) and
          scope.reset() (line 582) — neither exists. ADR-003 lists these as
          "Planned Enhancements" that were never implemented. Agents that learn
          from examples will generate code that does not compile.
        wrong_pattern: |
          .registerInterface<IDatabase>('IDatabase', PostgreSQLDatabase, 'Logger')
          .registerFactory('Config', (provider) => ({ ... }))
          scope.registerInstance('RequestId', requestId)
          scope.reset()
        correct_pattern: |
          .registerSingletonInterface<IDatabase>('IDatabase', PostgreSQLDatabase, 'Logger')
          .registerSingletonFactory('Config', (provider) => ({ ... }))
          // registerInstance() and reset() do not exist on scopes
          // For request-specific data, register a scoped factory instead
          .registerScopedFactory('RequestId', () => crypto.randomUUID())
        source: 'examples/unified-container-example.ts:109,113; docs/concurrency-patterns.md:229,582'
        priority: 'HIGH'
        status: 'active'
        version_context: 'v1.0.0-rc.0 — APIs listed as planned in ADR-003 but never implemented'

      - mistake: 'Using the stale Factory<T> type alias'
        mechanism: >
          types.ts:57 defines Factory<T> as (serviceProvider: ServiceLocator) => T.
          But actual factory parameters on ContainerBuilder accept
          (provider: TypeSafeServiceLocator<TRegistry>) => T. The Factory<T> type
          is a leftover from the pre-unified API. Using it produces type errors
          because ServiceLocator and TypeSafeServiceLocator are different interfaces.
        wrong_pattern: |
          import { Factory } from '@shirudo/kizuna';
          const myFactory: Factory<UserService> = (provider) => {
            // provider is ServiceLocator — lacks type-safe get()
            return new UserService(provider.get('Database'));
          };
        correct_pattern: |
          // Let TypeScript infer the factory type from registerSingletonFactory
          .registerSingletonFactory('UserService', (provider) => {
            // provider is TypeSafeServiceLocator<TRegistry> — fully typed
            const db = provider.get('Database'); // Type-safe!
            return new UserService(db);
          })
        source: 'maintainer interview; types.ts:57 vs container-builder.ts:204-207'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'v1.0.0-rc.0 — Factory<T> is dead code from pre-unified API'

      - mistake: 'Assuming singleton dispose is a no-op (outdated belief)'
        mechanism: >
          In earlier versions, SingletonLifecycle.dispose() was empty. As of v1.0.0-rc.0,
          singleton dispose works correctly: it calls instance.dispose() if the
          instance has that method, then permanently marks the lifecycle as disposed.
          Child scope disposal does NOT trigger singleton cleanup — only the root
          container dispose does this, because ServiceWrapper sets ownsLifecycle=false
          for shared singleton lifecycles. Agents referencing older docs may still
          tell users to manually close singleton resources before container.dispose().
        wrong_pattern: |
          const container = builder.build();
          const pool = container.get('dbPool');
          pool.close(); // Unnecessary manual cleanup
          container.dispose(); // pool.dispose() was already called
        correct_pattern: |
          const container = builder.build();
          // ... use container ...
          container.dispose(); // Singleton instances with dispose() are cleaned up automatically
        source: 'singleton.ts:187-203'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'Fixed in v1.0.0-rc.0 — singleton dispose now works correctly'

      - mistake: 'Async factory returns Promise instead of resolved value'
        mechanism: >
          Kizuna is synchronous. An async factory returns a Promise, and the
          container stores that Promise as the service instance. Type inference
          correctly shows Promise<T>, but developers who forget to await get
          a Promise object instead of their service. For singletons it is at
          least consistent; for scoped services, each scope gets a new Promise
          potentially opening connections that are never closed.
        wrong_pattern: |
          .registerSingletonFactory('db', async () => {
            return await connectToDatabase();
          })
          // container.get('db') returns Promise<Connection>, not Connection
          const db = container.get('db');
          db.query('SELECT 1'); // TypeError: db.query is not a function
        correct_pattern: |
          // Option A: Initialize before container
          const dbConnection = await connectToDatabase();
          const container = new ContainerBuilder()
            .registerSingletonFactory('db', () => dbConnection)
            .build();

          // Option B: Await at resolution (type-safe — TS enforces await)
          .registerSingletonFactory('db', async () => await connectToDatabase())
          const db = await container.get('db');
        source: 'maintainer interview; ADR-001'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'All versions'

      - mistake: 'startScope() is O(n) on total registrations'
        mechanism: >
          Every startScope() call allocates a new ServiceProvider, a new record,
          and a new ServiceWrapper for every registered service — including singletons
          whose createScope() just returns `this`. With 50 services and 10k req/sec,
          that is 500k+ object allocations per second.
        source: 'maintainer interview; service-provider.ts:49-57'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'All versions'

      - mistake: 'Over-wrapping build() in try-catch'
        mechanism: >
          Agents wrap build() in error handling that catches, logs, and rethrows.
          build() already throws clear errors. The added try-catch adds noise
          without value.
        wrong_pattern: |
          try {
            const container = builder.build();
          } catch (e) {
            console.error('Failed to build container:', e);
            throw e; // ...why did we catch it then
          }
        correct_pattern: |
          const container = builder.build();
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'
        version_context: 'All versions'

      - mistake: 'Mixing add* and register* on the same key'
        mechanism: >
          A key must be either single-registration (register*) or multi-registration
          (add*). Using both on the same key throws an error. Agents may try to
          register a "default" handler with registerSingleton and then add extras
          with addSingleton under the same key.
        wrong_pattern: |
          new ContainerBuilder()
            .registerSingleton('handler', DefaultHandler)
            .addSingleton('handler', ExtraHandler) // throws
            .build();
        correct_pattern: |
          // Use ONLY add* for multi-registration keys
          new ContainerBuilder()
            .addSingleton('handlers', DefaultHandler)
            .addSingleton('handlers', ExtraHandler)
            .build();
        source: 'base-container-builder.ts'
        priority: 'HIGH'
        status: 'active'
        version_context: 'v1.0.0-rc.0 — multi-registration feature added'

